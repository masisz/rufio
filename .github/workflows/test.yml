name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unix:
    name: Test (Ubuntu / Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ['3.2', '3.3']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test

  test-windows:
    name: Test (Windows / Ruby ${{ matrix.ruby }})
    runs-on: windows-latest
    strategy:
      matrix:
        ruby: ['3.2', '3.3']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      # Windows Console で ESC キーが機能するかを含む全テストを実行
      - name: Run tests (Windows)
        run: bundle exec rake test
        env:
          # Windows Console を強制 (ConPTY 経由にならないようにする)
          TERM: xterm-256color

      # Windows 専用: ESC キー・マルチバイト入力・マウスシーケンス・IO.select タイムアウトの検証
      - name: Run Windows console input tests
        run: bundle exec ruby -I test -I lib test/test_windows_console_input.rb
